naftiko: 1.0.0-alpha2
info:
  label: Complete InfluxDB Cloud API — Config
  description: 'Complete InfluxDB Cloud API — Config. 1 operations. Lead operation: Retrieve feature flags. Self-contained
    Naftiko capability covering one Influxdb business surface.'
  tags:
  - Influxdb
  - Config
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INFLUXDB_API_KEY: INFLUXDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: influxdb-config
    baseUri: ''
    description: Complete InfluxDB Cloud API — Config business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-flags
      path: /api/v2/flags
      operations:
      - name: getflags
        method: GET
        description: Retrieve feature flags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.INFLUXDB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: influxdb-config-rest
    port: 8080
    description: REST adapter for Complete InfluxDB Cloud API — Config. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/flags
      name: api-v2-flags
      description: REST surface for api-v2-flags.
      operations:
      - method: GET
        name: getflags
        description: Retrieve feature flags
        call: influxdb-config.getflags
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: influxdb-config-mcp
    port: 9090
    transport: http
    description: MCP adapter for Complete InfluxDB Cloud API — Config. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-feature-flags
      description: Retrieve feature flags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: influxdb-config.getflags
      outputParameters:
      - type: object
        mapping: $.
