naftiko: 1.0.0-alpha2
info:
  label: Complete InfluxDB Cloud API — Legacy Query
  description: 'Complete InfluxDB Cloud API — Legacy Query. 1 operations. Lead operation: Query with the 1.x compatibility
    API. Self-contained Naftiko capability covering one Influxdb business surface.'
  tags:
  - Influxdb
  - Legacy Query
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INFLUXDB_API_KEY: INFLUXDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: influxdb-legacy-query
    baseUri: ''
    description: Complete InfluxDB Cloud API — Legacy Query business capability. Self-contained, no shared references.
    resources:
    - name: query
      path: /query
      operations:
      - name: getlegacyquery
        method: GET
        description: Query with the 1.x compatibility API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
        - name: Accept-Encoding
          in: header
          type: string
          description: The content encoding (usually a compression algorithm) that the client can understand.
        - name: Content-Type
          in: header
          type: string
        - name: u
          in: query
          type: string
          description: The InfluxDB 1.x username to authenticate the request.
        - name: p
          in: query
          type: string
          description: The InfluxDB 1.x password to authenticate the request.
        - name: db
          in: query
          type: string
          description: The database to query data from.
          required: true
        - name: rp
          in: query
          type: string
          description: The retention policy to query data from.
        - name: q
          in: query
          type: string
          description: The InfluxQL query to execute. To execute multiple queries, delimit queries with a semicolon (`;`).
          required: true
        - name: epoch
          in: query
          type: string
          description: A unix timestamp precision.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.INFLUXDB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: influxdb-legacy-query-rest
    port: 8080
    description: REST adapter for Complete InfluxDB Cloud API — Legacy Query. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/query
      name: query
      description: REST surface for query.
      operations:
      - method: GET
        name: getlegacyquery
        description: Query with the 1.x compatibility API
        call: influxdb-legacy-query.getlegacyquery
        with:
          Accept: rest.Accept
          Accept-Encoding: rest.Accept-Encoding
          Content-Type: rest.Content-Type
          u: rest.u
          p: rest.p
          db: rest.db
          rp: rest.rp
          q: rest.q
          epoch: rest.epoch
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: influxdb-legacy-query-mcp
    port: 9090
    transport: http
    description: MCP adapter for Complete InfluxDB Cloud API — Legacy Query. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: query-1-x-compatibility-api
      description: Query with the 1.x compatibility API
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: influxdb-legacy-query.getlegacyquery
      with:
        Accept: tools.Accept
        Accept-Encoding: tools.Accept-Encoding
        Content-Type: tools.Content-Type
        u: tools.u
        p: tools.p
        db: tools.db
        rp: tools.rp
        q: tools.q
        epoch: tools.epoch
      outputParameters:
      - type: object
        mapping: $.
