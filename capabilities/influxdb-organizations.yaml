    - name: api-v2-orgs
      path: /api/v2/orgs
      operations:
      - name: getorgs
        method: GET
        description: List organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: query
          type: string
          description: An organization name.
        - name: orgID
          in: query
          type: string
          description: An organization ID.
        - name: userID
          in: query
          type: string
          description: A user ID.
      - name: postorgs
        method: POST
        description: Create an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-orgs-orgID
      path: /api/v2/orgs/{orgID}
      operations:
      - name: deleteorgsid
        method: DELETE
        description: Delete an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: path
          type: string
          description: The ID of the organization to delete.
          required: true
      - name: getorgsid
        method: GET
        description: Retrieve an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: path
          type: string
          description: The ID of the organization to retrieve.
          required: true
      - name: patchorgsid
        method: PATCH
        description: Update an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: path
          type: string
          description: The ID of the organization to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-orgs-orgID-members
      path: /api/v2/orgs/{orgID}/members
      operations:
      - name: getorgsidmembers
        method: GET
        description: List all members of an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: path
          type: string
          description: The ID of the organization to retrieve users for.
          required: true
      - name: postorgsidmembers
        method: POST
        description: Add a member to an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: path
          type: string
          description: The ID of the organization.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
