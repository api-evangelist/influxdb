naftiko: 1.0.0-alpha2
info:
  label: Complete InfluxDB Cloud API — Labels
  description: 'Complete InfluxDB Cloud API — Labels. 5 operations. Lead operation: List all labels. Self-contained Naftiko
    capability covering one Influxdb business surface.'
  tags:
  - Influxdb
  - Labels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INFLUXDB_API_KEY: INFLUXDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: influxdb-labels
    baseUri: ''
    description: Complete InfluxDB Cloud API — Labels business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-labels
      path: /api/v2/labels
      operations:
      - name: getlabels
        method: GET
        description: List all labels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: query
          type: string
          description: The organization ID.
      - name: postlabels
        method: POST
        description: Create a label
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-labels-labelID
      path: /api/v2/labels/{labelID}
      operations:
      - name: deletelabelsid
        method: DELETE
        description: Delete a label
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: labelID
          in: path
          type: string
          description: The ID of the label to delete.
          required: true
      - name: getlabelsid
        method: GET
        description: Retrieve a label
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: labelID
          in: path
          type: string
          description: The ID of the label to update.
          required: true
      - name: patchlabelsid
        method: PATCH
        description: Update a label
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: labelID
          in: path
          type: string
          description: The ID of the label to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.INFLUXDB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: influxdb-labels-rest
    port: 8080
    description: REST adapter for Complete InfluxDB Cloud API — Labels. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/labels
      name: api-v2-labels
      description: REST surface for api-v2-labels.
      operations:
      - method: GET
        name: getlabels
        description: List all labels
        call: influxdb-labels.getlabels
        with:
          orgID: rest.orgID
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postlabels
        description: Create a label
        call: influxdb-labels.postlabels
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/labels/{labelid}
      name: api-v2-labels-labelid
      description: REST surface for api-v2-labels-labelID.
      operations:
      - method: DELETE
        name: deletelabelsid
        description: Delete a label
        call: influxdb-labels.deletelabelsid
        with:
          labelID: rest.labelID
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getlabelsid
        description: Retrieve a label
        call: influxdb-labels.getlabelsid
        with:
          labelID: rest.labelID
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchlabelsid
        description: Update a label
        call: influxdb-labels.patchlabelsid
        with:
          labelID: rest.labelID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: influxdb-labels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Complete InfluxDB Cloud API — Labels. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-labels
      description: List all labels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: influxdb-labels.getlabels
      with:
        orgID: tools.orgID
      outputParameters:
      - type: object
        mapping: $.
    - name: create-label
      description: Create a label
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: influxdb-labels.postlabels
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-label
      description: Delete a label
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: influxdb-labels.deletelabelsid
      with:
        labelID: tools.labelID
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-label
      description: Retrieve a label
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: influxdb-labels.getlabelsid
      with:
        labelID: tools.labelID
      outputParameters:
      - type: object
        mapping: $.
    - name: update-label
      description: Update a label
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: influxdb-labels.patchlabelsid
      with:
        labelID: tools.labelID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
