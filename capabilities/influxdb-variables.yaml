        inputParameters:
        - name: variableID
          in: path
          type: string
          description: The variable ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: putvariablesid
        method: PUT
        description: Replace a variable
