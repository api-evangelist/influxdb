    - name: api-v2-telegrafs
      path: /api/v2/telegrafs
      operations:
      - name: gettelegrafs
        method: GET
        description: List all Telegraf configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: query
          type: string
          description: The organization ID the Telegraf config belongs to.
      - name: posttelegrafs
        method: POST
        description: Create a Telegraf configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-telegrafs-telegrafID
      path: /api/v2/telegrafs/{telegrafID}
      operations:
      - name: deletetelegrafsid
        method: DELETE
        description: Delete a Telegraf configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: telegrafID
          in: path
          type: string
          description: The Telegraf configuration ID.
          required: true
      - name: gettelegrafsid
        method: GET
        description: Retrieve a Telegraf configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: telegrafID
          in: path
          type: string
          description: The Telegraf configuration ID.
          required: true
        - name: Accept
          in: header
          type: string
      - name: puttelegrafsid
        method: PUT
        description: Update a Telegraf configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: telegrafID
          in: path
          type: string
          description: The Telegraf config ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
