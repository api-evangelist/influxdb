naftiko: 1.0.0-alpha2
info:
  label: Complete InfluxDB Cloud API — Signout
  description: 'Complete InfluxDB Cloud API — Signout. 1 operations. Lead operation: Expire a user session. Self-contained
    Naftiko capability covering one Influxdb business surface.'
  tags:
  - Influxdb
  - Signout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INFLUXDB_API_KEY: INFLUXDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: influxdb-signout
    baseUri: ''
    description: Complete InfluxDB Cloud API — Signout business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-signout
      path: /api/v2/signout
      operations:
      - name: postsignout
        method: POST
        description: Expire a user session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.INFLUXDB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: influxdb-signout-rest
    port: 8080
    description: REST adapter for Complete InfluxDB Cloud API — Signout. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/signout
      name: api-v2-signout
      description: REST surface for api-v2-signout.
      operations:
      - method: POST
        name: postsignout
        description: Expire a user session
        call: influxdb-signout.postsignout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: influxdb-signout-mcp
    port: 9090
    transport: http
    description: MCP adapter for Complete InfluxDB Cloud API — Signout. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: expire-user-session
      description: Expire a user session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: influxdb-signout.postsignout
      outputParameters:
      - type: object
        mapping: $.
