      path: /api/v2/dashboards/{dashboardID}/cells
      operations:
      - name: postdashboardsidcells
        method: POST
        description: Create a dashboard cell
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dashboardID
          in: path
          type: string
          description: The ID of the dashboard to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: putdashboardsidcells
        method: PUT
        description: Replace cells in a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dashboardID
          in: path
          type: string
          description: The ID of the dashboard to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
