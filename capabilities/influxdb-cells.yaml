        idempotent: true
      call: influxdb-cells.getdashboardsidcellsidview
      with:
        dashboardID: tools.dashboardID
        cellID: tools.cellID
      outputParameters:
      - type: object
        mapping: $.
    - name: update-view-cell
      description: Update the view for a cell
      hints:
        readOnly: false
        destructive: false
        idempotent: true
