          required: true
      - name: patchdashboardsidcellsidview
        method: PATCH
        description: Update the view for a cell
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dashboardID
          in: path
          type: string
          description: The ID of the dashboard to update.
          required: true
        - name: cellID
          in: path
          type: string
