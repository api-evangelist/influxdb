        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dashboardID
          in: path
          type: string
          description: The ID of the dashboard to delete.
          required: true
        - name: cellID
          in: path
          type: string
          description: The ID of the cell to delete.
          required: true
      - name: patchdashboardsidcellsid
        method: PATCH
        description: Update the non-positional information related to a cell
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dashboardID
          in: path
          type: string
          description: The ID of the dashboard to update.
          required: true
        - name: cellID
          in: path
          type: string
          description: The ID of the cell to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-dashboards-dashboardID-cells-cellID-view
      path: /api/v2/dashboards/{dashboardID}/cells/{cellID}/view
      operations:
      - name: getdashboardsidcellsidview
        method: GET
        description: Retrieve the view for a cell
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dashboardID
          in: path
          type: string
          description: The dashboard ID.
          required: true
        - name: cellID
          in: path
          type: string
