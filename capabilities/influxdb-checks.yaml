      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: influxdb-checks.patchchecksid
      with:
        checkID: tools.checkID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-check-2
