      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: influxdb-checks.createcheck
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-check
      description: Delete a check
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: influxdb-checks.deletechecksid
      with:
        checkID: tools.checkID
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-check
      description: Retrieve a check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: influxdb-checks.getchecksid
      with:
        checkID: tools.checkID
      outputParameters:
      - type: object
        mapping: $.
    - name: update-check
