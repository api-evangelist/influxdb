      path: /api/v2/checks
      operations:
      - name: getchecks
        method: GET
        description: List all checks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgID
          in: query
          type: string
          description: Only show checks that belong to a specific organization ID.
          required: true
      - name: createcheck
        method: POST
        description: Add new check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-checks-checkID
      path: /api/v2/checks/{checkID}
      operations:
      - name: deletechecksid
        method: DELETE
        description: Delete a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
      - name: getchecksid
        method: GET
        description: Retrieve a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
      - name: patchchecksid
        method: PATCH
        description: Update a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: putchecksid
        method: PUT
        description: Update a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-checks-checkID-labels
      path: /api/v2/checks/{checkID}/labels
      operations:
      - name: getchecksidlabels
        method: GET
        description: List all labels for a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
      - name: postchecksidlabels
        method: POST
        description: Add a label to a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-checks-checkID-labels-labelID
      path: /api/v2/checks/{checkID}/labels/{labelID}
      operations:
      - name: deletechecksidlabelsid
        method: DELETE
        description: Delete label from a check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
        - name: labelID
          in: path
          type: string
          description: The ID of the label to delete.
          required: true
    - name: api-v2-checks-checkID-query
      path: /api/v2/checks/{checkID}/query
      operations:
      - name: getchecksidquery
        method: GET
        description: Retrieve a check query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: checkID
          in: path
          type: string
          description: The check ID.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.INFLUXDB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: influxdb-checks-rest
    port: 8080
    description: REST adapter for Complete InfluxDB Cloud API — Checks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/checks
      name: api-v2-checks
      description: REST surface for api-v2-checks.
      operations:
      - method: GET
        name: getchecks
        description: List all checks
        call: influxdb-checks.getchecks
        with:
          orgID: rest.orgID
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcheck
        description: Add new check
        call: influxdb-checks.createcheck
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/checks/{checkid}
      name: api-v2-checks-checkid
      description: REST surface for api-v2-checks-checkID.
      operations:
      - method: DELETE
        name: deletechecksid
        description: Delete a check
        call: influxdb-checks.deletechecksid
